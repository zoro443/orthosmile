<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ortho Smile System | Dr. Adelma Maryam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --emerald: #064e3b; --gold: #ca8a04; --bg: #f8fafc; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); color: #1e293b; overflow-x: hidden; }
        .bg-gradient-clinic { background: linear-gradient(135deg, #064e3b 0%, #065f46 100%); }
        .card { background: white; border-radius: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .btn-primary { background-color: var(--emerald); color: white; transition: 0.3s; cursor: pointer; border: none; }
        .btn-primary:hover { opacity: 0.9; transform: scale(1.02); }
        .input-field { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; outline: none; transition: 0.3s; }
        .input-field:focus { border-color: var(--emerald); box-shadow: 0 0 0 3px rgba(6, 78, 59, 0.1); }
        .logo-img { width: 55px; height: 55px; border-radius: 12px; object-fit: cover; background: #eee; }
        .animate-status { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB7FloF9EzWdBfzVhDxO6xtH4JGPoPKPm0",
        authDomain: "orthosmile-eae67.firebaseapp.com",
        databaseURL: "https://orthosmile-eae67-default-rtdb.europe-west1.firebasedatabase.app/", 
        projectId: "orthosmile-eae67",
        storageBucket: "orthosmile-eae67.firebasestorage.app",
        messagingSenderId: "584825174344",
        appId: "1:584825174344:web:05fa016a168d7f47249b7d"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
</script>

<div class="max-w-md mx-auto p-4 space-y-5">
    <nav class="card flex justify-between items-center p-3">
        <div class="flex items-center gap-3 cursor-pointer" id="adminTrigger">
            <img src="logo.png" class="logo-img" onerror="this.src='https://via.placeholder.com/60/064e3b/ffffff?text=OS'"> 
            <div>
                <h1 class="text-sm font-bold text-emerald-900">أورثو سمايل</h1>
                <p class="text-[8px] text-gray-400 font-bold uppercase">Dr. Adelma Maryam</p>
            </div>
        </div>
        <button id="logoutBtn" class="hidden text-[10px] text-red-500 font-bold bg-red-50 px-2 py-1 rounded-lg">خروج</button>
    </nav>

    <section id="loginScreen" class="card p-6 space-y-4">
        <div class="text-center space-y-1">
            <h2 class="text-lg font-bold text-emerald-900">حجز موعد جديد</h2>
            <p class="text-[10px] text-gray-400">أهلاً بك في عيادة تقويم الأسنان المنيعة</p>
        </div>
        
        <input type="text" id="pName" placeholder="الاسم الكامل" class="input-field text-right" onkeypress="handleEnter(event, 'pArea')">
        <input type="text" id="pArea" placeholder="المنطقة / الحي" class="input-field text-right" onkeypress="handleEnter(event, 'pPhone')">
        
        <div class="relative">
            <input type="tel" id="pPhone" class="input-field text-left" dir="ltr" placeholder="06XXXXXXXX" oninput="toggleHint()" onkeypress="handleEnter(event, 'regBtn')">
            <p id="phoneHint" class="absolute top-3 right-3 text-[9px] text-gray-300 pointer-events-none">يرجى ادخال رقم هاتف صحيح للتواصل مع العيادة</p>
        </div>

        <button id="regBtn" onclick="register()" class="w-full btn-primary py-4 rounded-xl font-bold shadow-lg">إرسال طلب الموعد</button>
    </section>

    <section id="patientDashboard" class="hidden space-y-4">
        <div id="statusCard" class="p-6 rounded-[2rem] text-white shadow-xl bg-gradient-clinic relative overflow-hidden">
            <p class="text-[10px] opacity-80 mb-1">المريض: <span id="displayPName"></span></p>
            <h2 id="displayStatus" class="text-lg font-bold">جاري المزامنة...</h2>
        </div>

        <div class="grid grid-cols-3 gap-2">
            <a id="uiFB" target="_blank" class="card p-3 flex flex-col items-center bg-blue-50 border-blue-100">
                <span class="text-[10px] font-bold text-blue-700">فيسبوك</span>
            </a>
            <a id="uiLoc" target="_blank" class="card p-3 flex flex-col items-center bg-red-50 border-red-100">
                <span class="text-[10px] font-bold text-red-700">الموقع</span>
            </a>
            <a id="uiCall" class="card p-3 flex flex-col items-center bg-green-50 border-green-100">
                <span class="text-[10px] font-bold text-green-700">اتصال</span>
            </a>
        </div>
    </section>

    <section id="adminDashboard" class="hidden space-y-4">
        <div class="card bg-gray-900 text-white flex justify-between items-center py-4 px-5">
            <h2 class="font-bold text-xs">إدارة العيادة</h2>
            <button onclick="location.reload()" class="text-[10px] bg-red-600 px-3 py-1 rounded-lg">إغلاق</button>
        </div>

        <div class="card p-4 space-y-3">
            <p class="text-[11px] font-bold text-emerald-900 border-b pb-2">تحديث معلومات التواصل للعيادة:</p>
            <input type="text" id="inFB" placeholder="رابط الفيسبوك" class="input-field text-xs">
            <input type="text" id="inLoc" placeholder="إحداثيات الموقع (GPS)" class="input-field text-xs">
            <input type="text" id="inPhone" placeholder="رقم هاتف العيادة" class="input-field text-xs">
            <button onclick="saveSettings()" class="w-full py-2 bg-emerald-50 text-emerald-800 rounded-lg font-bold text-xs border border-emerald-100">حفظ بيانات التواصل</button>
        </div>

        <div class="card p-4 space-y-4">
            <p class="text-[11px] font-bold text-emerald-900">الأجندة وإدارة المواعيد:</p>
            <input type="date" id="adminDate" onchange="loadDateData()" class="input-field">
            
            <div id="dateDetails" class="hidden space-y-3">
                <div class="flex justify-between items-center p-2 bg-gray-50 rounded-lg border">
                    <span class="text-[10px]">الحد الأقصى للمرضى:</span>
                    <input type="number" id="inLimit" value="5" class="w-12 text-center border rounded">
                </div>
                <div id="adminPatientList" class="space-y-2"></div>
            </div>
        </div>
    </section>
</div>

<script>
    let activePhone = localStorage.getItem('active_phone');
    let registeredPhones = JSON.parse(localStorage.getItem('my_patients')) || [];

    function handleEnter(e, nextId) {
        if (e.key === "Enter") {
            e.preventDefault();
            const nextEl = document.getElementById(nextId);
            if (nextEl) nextEl.focus();
            if (nextId === 'regBtn') register();
        }
    }

    function toggleHint() {
        document.getElementById('phoneHint').style.display = document.getElementById('pPhone').value ? 'none' : 'block';
    }

    // التسجيل والأمان
    function register() {
        const name = document.getElementById('pName').value.trim();
        const area = document.getElementById('pArea').value.trim();
        const phone = document.getElementById('pPhone').value.trim();

        if(!name || !phone) return alert("يرجى ملء الاسم والهاتف");

        if(registeredPhones.length >= 2 && !registeredPhones.includes(phone)) {
            return alert("عذراً، يمكنك تسجيل مريضين فقط من هذا الجهاز");
        }

        db.ref('appointments').once('value', snap => {
            let exists = false;
            snap.forEach(c => { if(c.val().patientPhone === phone && c.val().status === 'pending') exists = true; });
            
            if(exists) { alert("لديك طلب نشط بالفعل"); login(phone); }
            else {
                db.ref('appointments').push({
                    patientName: name, patientArea: area, patientPhone: phone,
                    status: 'pending', createdAt: Date.now()
                });
                if(!registeredPhones.includes(phone)) registeredPhones.push(phone);
                localStorage.setItem('my_patients', JSON.stringify(registeredPhones));
                login(phone);
            }
        });
    }

    function login(phone) {
        activePhone = phone;
        localStorage.setItem('active_phone', phone);
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('patientDashboard').classList.remove('hidden');
        document.getElementById('logoutBtn').classList.remove('hidden');
        syncData();
    }

    function syncData() {
        // مزامنة الإعدادات (فيسبوك، موقع، هاتف)
        db.ref('clinic_info').on('value', s => {
            const v = s.val();
            if(v) {
                document.getElementById('uiFB').href = v.fb;
                document.getElementById('uiLoc').href = `https://www.google.com/maps?q=${v.loc}`;
                document.getElementById('uiCall').onclick = () => window.location.href = `tel:${v.phone}`;
                // ملء الخانات للمدير أيضاً
                document.getElementById('inFB').value = v.fb || "";
                document.getElementById('inLoc').value = v.loc || "";
                document.getElementById('inPhone').value = v.phone || "";
            }
        });

        // مزامنة المواعيد
        db.ref('appointments').on('value', snap => {
            const data = snap.val();
            if(!data) return;
            for(let id in data) {
                if(data[id].patientPhone === activePhone) {
                    const item = data[id];
                    document.getElementById('displayPName').innerText = item.patientName;
                    const st = document.getElementById('displayStatus');
                    const card = document.getElementById('statusCard');
                    if(item.status === 'done') {
                        st.innerHTML = `✅ تم تأكيد موعدك يوم:<br><span class="text-2xl text-gold">${item.appDate}</span>`;
                        card.classList.remove('animate-status');
                    } else {
                        st.innerHTML = "⏳ طلبك قيد المراجعة...<br><small class='text-[10px] opacity-70'>سنخبرك فور تأكيد التاريخ</small>";
                        card.classList.add('animate-status');
                    }
                }
            }
            if(document.getElementById('adminDashboard').offsetParent) renderAdmin(data);
        });
    }

    // وظائف المدير
    function saveSettings() {
        const info = {
            fb: document.getElementById('inFB').value,
            loc: document.getElementById('inLoc').value,
            phone: document.getElementById('inPhone').value
        };
        db.ref('clinic_info').set(info).then(() => alert("تم تحديث بيانات العيادة بنجاح!"));
    }

    let clicks = 0;
    document.getElementById('adminTrigger').onclick = () => {
        clicks++;
        if(clicks >= 5) {
            if(prompt("كلمة السر") === "1234") {
                document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
                document.getElementById('adminDashboard').classList.remove('hidden');
            }
            clicks = 0;
        }
    };

    function loadDateData() { document.getElementById('dateDetails').classList.remove('hidden'); }

    function renderAdmin(data) {
        const list = document.getElementById('adminPatientList');
        const selDate = document.getElementById('adminDate').value;
        list.innerHTML = "<p class='text-[10px] font-bold text-gray-400'>الطلبات الجديدة:</p>";
        for(let id in data) {
            const itm = data[id];
            if(itm.status === 'pending') {
                list.innerHTML += `
                <div class="p-3 bg-gray-50 rounded-xl border flex justify-between items-center text-xs">
                    <div><b>${itm.patientName}</b><br><small>${itm.patientArea}</small></div>
                    <button onclick="confirmApp('${id}')" class="bg-emerald text-white px-3 py-2 rounded-lg font-bold">تأكيد</button>
                </div>`;
            } else if(selDate && itm.appDate === selDate) {
                list.innerHTML += `<div class="p-2 bg-green-50 text-emerald-800 text-[10px] rounded border border-green-100">✅ مريض مؤكد: ${itm.patientName}</div>`;
            }
        }
    }

    function confirmApp(id) {
        const d = document.getElementById('adminDate').value;
        if(!d) return alert("اختر التاريخ من الأجندة أولاً");
        db.ref('appointments/' + id).update({ status: 'done', appDate: d });
    }

    document.getElementById('logoutBtn').onclick = () => { localStorage.removeItem('active_phone'); location.reload(); };
    if(activePhone) login(activePhone);
</script>

</body>
</html>
