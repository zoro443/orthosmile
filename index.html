<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أورثو سمايل</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; text-align: center; direction: rtl; padding: 20px; }
        .box { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 15px; border-top: 5px solid #d4af37; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .logo { width: 60px; height: 60px; background: #004d40; color: #d4af37; border-radius: 50%; margin: 0 auto 10px; line-height: 60px; font-weight: bold; cursor: pointer; border: 2px solid #d4af37; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        button { background: #004d40; color: white; border: none; cursor: pointer; font-weight: bold; }
        .admin-panel { display: none; background: #f9f9f9; padding: 15px; border: 1px dashed #004d40; margin-top: 20px; text-align: right; }
        .item { background: white; padding: 10px; margin: 5px 0; border-right: 3px solid #d4af37; font-size: 14px; }
    </style>
</head>
<body>

<div class="box">
    <div class="logo" onclick="openAdmin()">OS</div>
    <h2 style="color:#004d40; margin:0;">أورثو سمايل</h2>
    
    <div id="userSide">
        <input type="text" id="name" placeholder="الاسم الكامل">
        <input type="tel" id="phone" placeholder="الهاتف (05/06/07)" maxlength="10">
        <input type="date" id="date" onchange="check()">
        <select id="time"><option value="">اختر التاريخ</option></select>
        <button id="btn" onclick="send()">تأكيد الحجز</button>
    </div>

    <div id="adminSide" class="admin-panel">
        <h3 style="text-align:center;">إدارة العيادة</h3>
        <label>الحد اليومي:</label>
        <input type="number" id="limitNum" placeholder="10">
        <button onclick="setLimit()">حفظ</button>
        <hr>
        <h4>المواعيد:</h4>
        <div id="list">..</div>
        <button onclick="location.reload()" style="background:#666">خروج</button>
    </div>
</div>

<script>
    // ضع بياناتك هنا بدقة
    const firebaseConfig = {
        apiKey: "AIza...", 
        databaseURL: "https://...",
        projectId: "..."
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    async function check() {
        const d = document.getElementById('date').value;
        const sel = document.getElementById('time');
        const btn = document.getElementById('btn');

        if (new Date(d).getDay() === 5) { alert("الجمعة عطلة"); btn.disabled = true; return; }

        const snap = await db.ref('bookings').orderByChild('date').equalTo(d).once('value');
        const limitSnap = await db.ref('settings/limit').once('value');
        const max = limitSnap.val() || 10;

        if (snap.numChildren() >= max) {
            alert("اكتمل العدد لهذا اليوم");
            btn.disabled = true;
        } else {
            btn.disabled = false;
            sel.innerHTML = "";
            for(let i=9; i<16; i++) {
                let op = document.createElement('option');
                op.value = i+":00"; op.text = i+":00";
                sel.appendChild(op);
            }
        }
    }

    function send() {
        const n = document.getElementById('name').value;
        const p = document.getElementById('phone').value;
        const d = document.getElementById('date').value;
        const t = document.getElementById('time').value;
        if (!/^(05|06|07)[0-9]{8}$/.test(p)) { alert("رقم خاطئ"); return; }
        
        db.ref('bookings').push({name:n, phone:p, date:d, time:t}).then(()=> {
            alert("تم الحجز!"); location.reload();
        });
    }

    let c = 0;
    function openAdmin() {
        c++;
        if (c === 5) {
            let p = prompt("السر:");
            if (p === "1234") {
                document.getElementById('userSide').style.display='none';
                document.getElementById('adminSide').style.display='block';
                load();
            }
            c = 0;
        }
    }

    function setLimit() {
        const v = document.getElementById('limitNum').value;
        db.ref('settings/limit').set(parseInt(v)).then(()=>alert("تم"));
    }

    function load() {
        db.ref('bookings').on('value', s => {
            const l = document.getElementById('list'); l.innerHTML = "";
            s.forEach(child => {
                const b = child.val();
                l.innerHTML += `<div class="item">${b.name} - ${b.phone}<br>${b.date} / ${b.time}</div>`;
            });
        });
    }
</script>
</body>
</html>
