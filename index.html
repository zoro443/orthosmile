<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أورثو سمايل - نظام الحجز الذكي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #004d40; --gold: #d4af37; --bg: #f4f7f6; --danger: #c62828; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 15px; direction: rtl; }
        .app-card { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 6px solid var(--gold); }
        .logo-section { text-align: center; margin-bottom: 25px; cursor: pointer; user-select: none; }
        .logo-btn { width: 80px; height: 80px; background: var(--primary); border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; color: var(--gold); font-size: 24px; font-weight: bold; border: 3px solid var(--gold); transition: 0.3s; }
        .logo-btn:active { transform: scale(0.9); }
        input, select, button { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; outline: none; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.9; }
        .status-alert { background: #ffebee; color: var(--danger); padding: 12px; border-radius: 10px; display: none; font-weight: bold; font-size: 14px; margin-bottom: 10px; border-right: 4px solid var(--danger); }
        /* لوحة المدير */
        .admin-panel { display: none; background: #f1f8e9; border: 2px dashed var(--primary); padding: 20px; border-radius: 20px; margin-top: 20px; text-align: right; }
        .appointment-box { background: white; padding: 15px; margin: 10px 0; border-radius: 12px; border-right: 5px solid var(--gold); position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn-del { background: var(--danger); width: auto; padding: 5px 15px; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="app-card" id="userApp">
    <div class="logo-section" onclick="triggerAdmin()">
        <div class="logo-btn">OS</div>
        <h2 style="color: var(--primary); margin: 0;">أورثو سمايل</h2>
        <p style="color: #666; font-size: 14px;">عيادة تقويم الأسنان - المنيعة</p>
    </div>

    <div id="formSection">
        <input type="text" id="nameInput" placeholder="الاسم الكامل للمريض">
        <input type="tel" id="phoneInput" placeholder="رقم الهاتف (05/06/07XXXXXXXX)" maxlength="10">
        <input type="date" id="dateInput" onchange="validateDay()">
        
        <div id="msgBox" class="status-alert"></div>
        
        <select id="timeInput">
            <option value="">اختر التاريخ أولاً</option>
        </select>
        
        <button id="mainBtn" onclick="handleBooking()">تأكيد الحجز الآن</button>
    </div>

    <div id="adminArea" class="admin-panel">
        <h3 style="color: var(--primary); text-align: center;">⚙️ لوحة الإدارة</h3>
        
        <label>الحد الأقصى للمرضى يومياً:</label>
        <input type="number" id="limitConfig" placeholder="مثلاً: 10">
        <button onclick="saveLimit()">حفظ التعديل</button>

        <hr style="margin: 20px 0; border: 0.5px solid #ccc;">
        
        <label>إغلاق تاريخ استثنائي (عطلة):</label>
        <input type="date" id="blockDate">
        <button onclick="addOffDay()" style="background: #555;">إغلاق هذا اليوم</button>

        <h4>المواعيد المحجوزة:</h4>
        <div id="bookingList">جاري التحميل...</div>
        <button onclick="location.reload()" style="background:#777">خروج من الإدارة</button>
    </div>
</div>

<script>
    // --- إعدادات Firebase (يجب وضع بياناتك هنا) ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        databaseURL: "YOUR_DATABASE_URL",
        projectId: "YOUR_PROJECT_ID"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- منطق الحجز والتحقق ---
    async function validateDay() {
        const date = document.getElementById('dateInput').value;
        const msg = document.getElementById('msgBox');
        const btn = document.getElementById('mainBtn');
        const select = document.getElementById('timeInput');
        
        // 1. منع الجمعة
        if (new Date(date).getDay() === 5) {
            return showAlert("العيادة مغلقة يوم الجمعة");
        }

        // 2. التحقق من أيام العطل اليدوية
        const offDays = await db.ref('offDays').once('value');
        let isClosed = false;
        offDays.forEach(d => { if(d.val() === date) isClosed = true; });
        if (isClosed) return showAlert("نعتذر، العيادة مغلقة في هذا التاريخ");

        // 3. التحقق من الحد اليومي
        const limitSnap = await db.ref('settings/limit').once('value');
        const maxLimit = limitSnap.val() || 10; // 10 كحد افتراضي
        
        const bookingsSnap = await db.ref('bookings').orderByChild('date').equalTo(date).once('value');
        const count = bookingsSnap.numChildren();

        if (count >= maxLimit) {
            return showAlert(`اكتملت المواعيد (الحد ${maxLimit} مرضى يومياً)`);
        }

        // إذا كان متاحاً
        msg.style.display = 'none';
        btn.style.display = 'block';
        select.innerHTML = '';
        for (let h=9; h<17; h++) {
            let t = h + ":00";
            let opt = document.createElement('option'); opt.value = t; opt.text = t; select.appendChild(opt);
        }
    }

    function showAlert(txt) {
        const msg = document.getElementById('msgBox');
        msg.innerText = "⚠️ " + txt;
        msg.style.display = 'block';
        document.getElementById('mainBtn').style.display = 'none';
        document.getElementById('timeInput').innerHTML = '<option>غير متاح</option>';
    }

    function handleBooking() {
        const n = document.getElementById('nameInput').value;
        const p = document.getElementById('phoneInput').value;
        const d = document.getElementById('dateInput').value;
        const t = document.getElementById('timeInput').value;
        const phoneReg = /^(05|06|07)[0-9]{8}$/;

        if (!n || !phoneReg.test(p) || !d || !t) {
            alert("يرجى إدخال اسمك ورقم هاتف صحيح مكون من 10 أرقام (05/06/07)");
            return;
        }

        db.ref('bookings').push({ name: n, phone: p, date: d, time: t }).then(() => {
            alert("تم تسجيل موعدك بنجاح! ننتظركم في العيادة.");
            location.reload();
        });
    }

    // --- وظائف المدير ---
    let clicks = 0;
    function triggerAdmin() {
        clicks++;
        if (clicks === 5) {
            if (prompt("كلمة سر المدير:") === "1234") {
                document.getElementById('formSection').style.display = 'none';
                document.getElementById('adminArea').style.display = 'block';
                loadAdminData();
            }
            clicks = 0;
        }
    }

    function saveLimit() {
        const l = document.getElementById('limitConfig').value;
        if(l) db.ref('settings/limit').set(parseInt(l)).then(() => alert("تم تحديث الحد اليومي بنجاح"));
    }

    function addOffDay() {
        const d = document.getElementById('blockDate').value;
        if(d) db.ref('offDays').push(d).then(() => alert("تم إغلاق التاريخ المحدد"));
    }

    function loadAdminData() {
        const list = document.getElementById('bookingList');
        db.ref('bookings').on('value', snap => {
            list.innerHTML = '';
            snap.forEach(child => {
                const b = child.val();
                list.innerHTML += `<div class="appointment-box">
                    <strong>${b.name}</strong> (${b.phone})<br>
                    📅 ${b.date} | ⏰ ${b.time}
                    <button class="btn-del" onclick="deleteBooking('${child.key}')">حذف الموعد</button>
                </div>`;
            });
        });
    }

    function deleteBooking(key) { if(confirm("هل تريد حذف الموعد فعلاً؟")) db.ref('bookings').child(key).remove(); }
</script>
</body>
</html>
